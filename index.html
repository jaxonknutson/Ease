<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>State Check</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f0f;
    color: white;
    overflow: hidden;
  }

  .screen {
    display: none;
    height: 100vh;
    width: 100vw;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  button {
    font-size: 20px;
    padding: 18px;
    margin: 10px;
    width: 80%;
    max-width: 320px;
    border-radius: 14px;
    border: none;
    background: white;
    color: black;
  }

  #pvtBtn {
    height: 160px;
    font-size: 28px;
  }

  .small {
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<!-- ENTRY -->
<div class="screen" id="start" style="display:flex;">
  <h1>State Check</h1>
  <p class="small">4-minute reset + signal test</p>
  <button onclick="startPVT()">Start</button>
</div>

<!-- PVT -->
<div class="screen" id="pvt">
  <h2>Tap when GREEN</h2>
  <p id="pvtStatus" class="small">Wait...</p>
  <button id="pvtBtn" onclick="pvtClick()">WAIT</button>
</div>

<!-- POSTURE + QUESTIONS -->
<div class="screen" id="posture">
  <h2>Body Check</h2>

  <p>Posture?</p>
  <button onclick="setPosture('open')">Open</button>
  <button onclick="setPosture('neutral')">Neutral</button>
  <button onclick="setPosture('tight')">Tight</button>

  <p>Energy?</p>
  <button onclick="setEnergy('low')">Low</button>
  <button onclick="setEnergy('normal')">Normal</button>
  <button onclick="setEnergy('high')">High</button>

  <p>Focus right now?</p>
  <button onclick="setFocus('clear')">Clear</button>
  <button onclick="setFocus('scattered')">Scattered</button>
  <button onclick="setFocus('stuck')">Stuck</button>

  <button onclick="startBreathing()">Continue</button>
</div>

<!-- BREATHING -->
<div class="screen" id="breathing">
  <h2>Breathing Test</h2>
  <p class="small">Count breaths for 30 seconds</p>

  <h1 id="breathTimer">30</h1>

  <p>Enter breaths counted:</p>
  <input id="breathCount" type="number" style="font-size:20px; padding:10px; width:120px; text-align:center;">

  <button onclick="startHeart()">Next</button>
</div>

<!-- HEART RATE -->
<div class="screen" id="heart">
  <h2>Heart Rate Test</h2>
  <p class="small">Count pulse for 15 seconds ×4</p>

  <h1 id="heartTimer">15</h1>

  <p>Enter beats counted:</p>
  <input id="heartCount" type="number" style="font-size:20px; padding:10px; width:120px; text-align:center;">

  <button onclick="finish()">Finish</button>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <h1 id="stateOut"></h1>
  <p id="resetOut"></p>
  <button onclick="location.reload()">Run Again</button>
</div>

<script>

/* ---------------- DATA ---------------- */
let pvtRTs = [];
let pvtStart;
let waiting = false;

let posture = "";
let energy = "";
let focus = "";

let breathRate = 0;
let heartRate = 0;

/* ---------------- NAV ---------------- */
function show(id){
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}

/* ---------------- PVT ---------------- */
let pvtTimeout;

function startPVT(){
  show('pvt');
  nextTrial();
}

function nextTrial(){
  let delay = Math.random()*2000 + 1000;

  document.getElementById("pvtBtn").innerText = "WAIT";
  document.getElementById("pvtStatus").innerText = "Wait...";

  waiting = false;

  pvtTimeout = setTimeout(() => {
    document.getElementById("pvtBtn").innerText = "TAP!";
    document.getElementById("pvtStatus").innerText = "GO!";
    pvtStart = Date.now();
    waiting = true;
  }, delay);
}

function pvtClick(){
  if(!waiting) return;
  pvtRTs.push(Date.now() - pvtStart);
  nextTrial();
}

/* move after 60 sec */
setTimeout(() => {
  clearTimeout(pvtTimeout);
  startPosture();
}, 60000);

/* ---------------- POSTURE ---------------- */
function startPosture(){
  show('posture');
}

function setPosture(v){ posture = v; }
function setEnergy(v){ energy = v; }
function setFocus(v){ focus = v; }

function startBreathing(){
  startBreathTimer();
}

/* ---------------- BREATHING ---------------- */
let breathTime = 30;
let breathInterval;

function startBreathTimer(){
  show('breathing');
  breathTime = 30;

  breathInterval = setInterval(() => {
    breathTime--;
    document.getElementById("breathTimer").innerText = breathTime;

    if(breathTime <= 0){
      clearInterval(breathInterval);
    }
  }, 1000);
}

function startHeart(){
  breathRate = parseInt(document.getElementById("breathCount").value || 0);
  startHeartTimer();
}

/* ---------------- HEART RATE ---------------- */
let heartTime = 15;
let heartInterval;

function startHeartTimer(){
  show('heart');
  heartTime = 15;

  heartInterval = setInterval(() => {
    heartTime--;
    document.getElementById("heartTimer").innerText = heartTime;

    if(heartTime <= 0){
      clearInterval(heartInterval);
    }
  }, 1000);
}

function finish(){
  heartRate = parseInt(document.getElementById("heartCount").value || 0) * 4;

  show('result');

  let avg = pvtRTs.reduce((a,b)=>a+b,0)/pvtRTs.length;
  let variability = 0;

  for(let i=1;i<pvtRTs.length;i++){
    variability += Math.abs(pvtRTs[i]-pvtRTs[i-1]);
  }

  let state = "";
  let reset = "";

  /* ---------------- STATE LOGIC ---------------- */

  if(variability > 250){
    state = "Cognitive Overload";
    reset = "60 sec single-focus + reduce inputs.";
  }

  else if(avg > 450){
    state = "Low Energy";
    reset = "Move + sunlight + hydration.";
  }

  else if(breathRate > 18 || heartRate > 90){
    state = "High Arousal";
    reset = "Slow exhale breathing for 60 sec.";
  }

  else if(posture === "tight"){
    state = "Physical Tension";
    reset = "Open chest + stand + reset posture.";
  }

  else if(focus === "stuck"){
    state = "Behavioral Block";
    reset = "Start smallest possible action (2 min).";
  }

  else {
    state = "Stable";
    reset = "No reset needed.";
  }

  document.getElementById("stateOut").innerText = state;
  document.getElementById("resetOut").innerText = reset;
}

</script>

</body>
</html>
