<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>State Check</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f0f;
    color: white;
    overflow: hidden;
  }

  .screen {
    display: none;
    height: 100vh;
    width: 100vw;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  button {
    font-size: 18px;
    padding: 16px;
    margin: 8px;
    width: 80%;
    max-width: 320px;
    border-radius: 14px;
    border: none;
    background: #222;
    color: white;
    transition: 0.2s;
  }

  /* SELECTED STATE */
  .selected {
    background: #4caf50 !important;
    color: black !important;
    transform: scale(1.03);
  }

  #pvtBtn {
    height: 160px;
    font-size: 28px;
  }

  .small {
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<!-- ENTRY -->
<div class="screen" id="start" style="display:flex;">
  <h1>State Check</h1>
  <p class="small">4-minute reset + signal test</p>
  <button onclick="startPVT()">Start</button>
</div>

<!-- PVT -->
<div class="screen" id="pvt">
  <h2>Tap when GREEN</h2>
  <p id="pvtStatus" class="small">Wait...</p>
  <button id="pvtBtn" onclick="pvtClick()">WAIT</button>
</div>

<!-- POSTURE -->
<div class="screen" id="posture">
  <h2>Body Check</h2>

  <p>Posture</p>
  <button onclick="setPosture(this,'open')">Open</button>
  <button onclick="setPosture(this,'neutral')">Neutral</button>
  <button onclick="setPosture(this,'tight')">Tight</button>

  <p>Energy</p>
  <button onclick="setEnergy(this,'low')">Low</button>
  <button onclick="setEnergy(this,'normal')">Normal</button>
  <button onclick="setEnergy(this,'high')">High</button>

  <p>Focus</p>
  <button onclick="setFocus(this,'clear')">Clear</button>
  <button onclick="setFocus(this,'scattered')">Scattered</button>
  <button onclick="setFocus(this,'stuck')">Stuck</button>

  <button onclick="startBreathing()">Continue</button>
</div>

<!-- BREATHING -->
<div class="screen" id="breathing">
  <h2>Breathing Test</h2>
  <p class="small">Count breaths for 30 seconds</p>

  <h1 id="breathTimer">30</h1>

  <p>Breaths counted:</p>
  <input id="breathCount" type="number" style="font-size:20px; padding:10px; width:120px; text-align:center;">

  <button onclick="startHeart()">Next</button>
</div>

<!-- HEART -->
<div class="screen" id="heart">
  <h2>Heart Rate Test</h2>
  <p class="small">Count beats for 15 seconds ×4</p>

  <h1 id="heartTimer">15</h1>

  <p>Beats counted:</p>
  <input id="heartCount" type="number" style="font-size:20px; padding:10px; width:120px; text-align:center;">

  <button onclick="finish()">Finish</button>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <h1 id="stateOut"></h1>
  <p id="resetOut"></p>
  <button onclick="location.reload()">Run Again</button>
</div>

<script>

/* ---------------- STATE ---------------- */
let pvtRTs = [];
let pvtStart;
let waiting = false;

let posture = "";
let energy = "";
let focus = "";

let breathRate = 0;
let heartRate = 0;

/* ---------------- SCREEN CONTROL ---------------- */
function show(id){
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}

/* ---------------- BUTTON SELECTION UI ---------------- */
function select(btn){
  let siblings = btn.parentNode.querySelectorAll('button');
  siblings.forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

/* ---------------- START ---------------- */
function startPVT(){
  show('pvt');
  nextTrial();
}

/* ---------------- PVT ---------------- */
let pvtTimeout;

function nextTrial(){
  let delay = Math.random()*2000 + 1000;

  document.getElementById("pvtBtn").innerText = "WAIT";
  document.getElementById("pvtStatus").innerText = "Wait...";

  waiting = false;

  pvtTimeout = setTimeout(() => {
    document.getElementById("pvtBtn").innerText = "TAP!";
    document.getElementById("pvtStatus").innerText = "GO!";
    pvtStart = Date.now();
    waiting = true;
  }, delay);
}

function pvtClick(){
  if(!waiting) return;
  pvtRTs.push(Date.now() - pvtStart);
  nextTrial();
}

/* auto transition */
setTimeout(() => {
  clearTimeout(pvtTimeout);
  startPosture();
}, 60000);

/* ---------------- POSTURE ---------------- */
function startPosture(){
  show('posture');
}

function setPosture(btn,val){
  posture = val;
  select(btn);
}

function setEnergy(btn,val){
  energy = val;
  select(btn);
}

function setFocus(btn,val){
  focus = val;
  select(btn);
}

/* ---------------- BREATHING ---------------- */
let breathTime = 30;
let breathInterval;

function startBreathing(){
  show('breathing');

  breathTime = 30;
  breathInterval = setInterval(() => {
    breathTime--;
    document.getElementById("breathTimer").innerText = breathTime;

    if(breathTime <= 0){
      clearInterval(breathInterval);
    }
  }, 1000);
}

/* ---------------- HEART ---------------- */
let heartTime = 15;
let heartInterval;

function startHeart(){
  breathRate = parseInt(document.getElementById("breathCount").value || 0);
  startHeartTimer();
}

function startHeartTimer(){
  show('heart');

  heartTime = 15;
  heartInterval = setInterval(() => {
    heartTime--;
    document.getElementById("heartTimer").innerText = heartTime;

    if(heartTime <= 0){
      clearInterval(heartInterval);
    }
  }, 1000);
}

/* ---------------- RESULT ---------------- */
function finish(){
  heartRate = parseInt(document.getElementById("heartCount").value || 0) * 4;

  show('result');

  let avg = pvtRTs.reduce((a,b)=>a+b,0)/pvtRTs.length;
  let variability = 0;

  for(let i=1;i<pvtRTs.length;i++){
    variability += Math.abs(pvtRTs[i]-pvtRTs[i-1]);
  }

  let state = "";
  let reset = "";

  if(variability > 250){
    state = "Cognitive Overload";
    reset = "Single-focus reset (60 sec).";
  }
  else if(avg > 450){
    state = "Low Energy";
    reset = "Move + light exposure.";
  }
  else if(breathRate > 18 || heartRate > 90){
    state = "High Arousal";
    reset = "Slow exhale breathing.";
  }
  else if(posture === "tight"){
    state = "Physical Tension";
    reset = "Open chest + stand.";
  }
  else if(focus === "stuck"){
    state = "Behavioral Block";
    reset = "Start smallest action.";
  }
  else {
    state = "Stable";
    reset = "No reset needed.";
  }

  document.getElementById("stateOut").innerText = state;
  document.getElementById("resetOut").innerText = reset;
}

</script>

</body>
</html>
